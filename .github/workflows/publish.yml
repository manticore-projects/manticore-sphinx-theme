name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  id-token: write # needed for trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi # optional: use a GitHub environment for approval
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dart-sass
        run: |
          SASS_VERSION="1.86.3"
          curl -sL "https://github.com/sass/dart-sass/releases/download/${SASS_VERSION}/dart-sass-${SASS_VERSION}-linux-x64.tar.gz" \
            | tar xz -C /usr/local/bin --strip-components=1 dart-sass/sass
          sass --version

      - name: Compile SASS
        run: python make.py css css-min

      - name: Build sdist + wheel
        run: pip install build && python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
